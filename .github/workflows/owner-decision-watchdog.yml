name: Owner Decision Watchdog

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes (reduced frequency)
  pull_request:
    types: [labeled]
  issues:
    types: [labeled]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  check-owner-decision:
    runs-on: ubuntu-latest
    # Only run on schedule or when relevant labels are added
    if: >
      github.event_name == 'schedule' ||
      (github.event_name == 'pull_request' && (
        contains(github.event.label.name, 'state:owner-decision') ||
        contains(github.event.label.name, 'risk:high') ||
        contains(github.event.label.name, 'gate:')
      )) ||
      (github.event_name == 'issues' && (
        contains(github.event.label.name, 'state:owner-decision') ||
        contains(github.event.label.name, 'risk:high') ||
        contains(github.event.label.name, 'gate:')
      ))
    steps:
      - name: Check for PRs needing Owner Decision
        id: check_pr
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Condition 1: PR has approved-by-agent-c + approved-by-orchestrator + state:owner-decision
          # and does not already have owner-decision-notified
          PRS=$(gh pr list \
            --state open \
            --json number,title,labels \
            --jq '.[] | select(
              (.labels | map(.name) | contains(["approved-by-agent-c", "approved-by-orchestrator", "state:owner-decision"])) and
              (.labels | map(.name) | contains(["owner-decision-notified"]) | not)
            ) | .number')

          if [ -z "$PRS" ]; then
            echo "found_pr=false" >> $GITHUB_OUTPUT
          else
            echo "found_pr=true" >> $GITHUB_OUTPUT
            echo "pr_numbers<<EOF" >> $GITHUB_OUTPUT
            echo "$PRS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Check for high-risk owner gates
        id: check_gates
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Condition 2: Issue or PR carries high-risk owner gate labels
          GATE_LABELS=(
            "risk:high"
            "gate:vm-required"
            "gate:driver-install-required"
            "gate:signing-required"
            "gate:hardware-required"
            "gate:rollback-required"
          )

          FOUND_ITEMS=""

          for LABEL in "${GATE_LABELS[@]}"; do
            # Check issues with this label
            ISSUE_NUMBERS=$(gh issue list \
              --label "$LABEL" \
              --state open \
              --json number \
              --jq '.[].number' 2>/dev/null || echo "")

            # Check PRs with this label
            PR_NUMBERS=$(gh pr list \
              --label "$LABEL" \
              --state open \
              --json number \
              --jq '.[].number' 2>/dev/null || echo "")

            # Collect all items with this label
            for NUM in $ISSUE_NUMBERS; do
              if [ -n "$NUM" ]; then
                FOUND_ITEMS="$FOUND_ITEMS issue:$NUM:$LABEL"
              fi
            done

            for NUM in $PR_NUMBERS; do
              if [ -n "$NUM" ]; then
                FOUND_ITEMS="$FOUND_ITEMS pr:$NUM:$LABEL"
              fi
            done
          done

          if [ -z "$FOUND_ITEMS" ]; then
            echo "found_gates=false" >> $GITHUB_OUTPUT
          else
            echo "found_gates=true" >> $GITHUB_OUTPUT
            echo "items<<EOF" >> $GITHUB_OUTPUT
            echo "$FOUND_ITEMS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Notify Owner for PRs
        if: steps.check_pr.outputs.found_pr == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$PRS" | while read -r PR; do
            if [ -z "$PR" ]; then continue; fi

            # Add de-duplication label
            gh pr edit "$PR" --add-label "owner-decision-notified" 2>/dev/null || true

            # Comment notification
            gh pr comment "$PR" --body "## 🔔 Owner Decision Required

          This PR has been approved by Agent C and Orchestrator and is now waiting for Owner decision.

          **Status**: \`state:owner-decision\`
          **Next step**: Owner review and merge approval

          Please review and approve or request changes.

          🤖 Automated notification by Owner Decision Watchdog"

            echo "Notified PR #$PR"
          done
        env:
          PRS: ${{ steps.check_pr.outputs.pr_numbers }}

      - name: Notify Owner for high-risk gates
        if: steps.check_gates.outputs.found_gates == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ITEMS: ${{ steps.check_gates.outputs.items }}
        run: |
          echo "$ITEMS" | while read -r ITEM; do
            if [ -z "$ITEM" ]; then continue; fi

            # Parse item: type:number:label
            TYPE=$(echo "$ITEM" | cut -d: -f1)
            NUMBER=$(echo "$ITEM" | cut -d: -f2)
            LABEL=$(echo "$ITEM" | cut -d: -f3-)

            BODY="## 🔔 High-Risk Gate Detected

          This $TYPE has label \`$LABEL\` which requires Owner decision.

          **Safety boundary**: Automatic actions are blocked until Owner approval.

          🤖 Automated notification by Owner Decision Watchdog"

            if [ "$TYPE" = "issue" ]; then
              gh issue comment "$NUMBER" --body "$BODY" 2>/dev/null || true
              echo "Notified issue #$NUMBER"
            elif [ "$TYPE" = "pr" ]; then
              gh pr comment "$NUMBER" --body "$BODY" 2>/dev/null || true
              echo "Notified PR #$NUMBER"
            fi
          done
