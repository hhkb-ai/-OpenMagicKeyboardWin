name: Agent A - Code Hardening

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  check-and-execute:
    runs-on: windows-latest
    steps:
      - name: Check for ready Agent A issues
        id: check
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Requirement 1: Silent exit when no matching issue
          # Requirement 2: Process only one issue at a time
          ISSUES=$(gh issue list \
            --label "agent:a" \
            --label "state:ready" \
            --state open \
            --limit 1 \
            --json number,title,body)

          if [ "$ISSUES" = "[]" ] || [ -z "$ISSUES" ]; then
            echo "found=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          ISSUE_NUMBER=$(echo "$ISSUES" | jq -r '.[0].number')
          ISSUE_TITLE=$(echo "$ISSUES" | jq -r '.[0].title')
          ISSUE_BODY=$(echo "$ISSUES" | jq -r '.[0].body')

          # Requirement 3: Parse allowed files from issue body
          ALLOWED_FILES=$(echo "$ISSUE_BODY" | grep -oP '(?<=^- `)[^`]+(?=`)' | head -10)

          if [ -z "$ALLOWED_FILES" ]; then
            echo "::error::Requirement 4: Failed to parse allowed files from issue body"
            echo "found=false" >> $GITHUB_OUTPUT
            exit 1
          fi

          echo "found=true" >> $GITHUB_OUTPUT
          echo "issue_number=$ISSUE_NUMBER" >> $GITHUB_OUTPUT
          echo "issue_title=$ISSUE_TITLE" >> $GITHUB_OUTPUT
          echo "allowed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$ALLOWED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "Found issue #$ISSUE_NUMBER: $ISSUE_TITLE"
          echo "Allowed files: $ALLOWED_FILES"

      - name: Checkout code
        if: steps.check.outputs.found == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run baseline dotnet test
        if: steps.check.outputs.found == 'true'
        id: baseline_test
        shell: bash
        run: |
          # Requirement 6: Stop if baseline test fails
          dotnet test tests/OpenMagicKeyboard.TransformTests/ --verbosity normal
          if [ $? -ne 0 ]; then
            echo "::error::Baseline dotnet test failed"
            exit 1
          fi
          echo "Baseline test passed"

      - name: Claim issue
        if: steps.check.outputs.found == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE=${{ steps.check.outputs.issue_number }}
          gh issue comment $ISSUE --body "CLAIMED by Agent A (GitHub Actions)"
          gh issue edit $ISSUE \
            --remove-label "state:ready" \
            --add-label "state:in-progress" 2>/dev/null || \
          gh issue edit $ISSUE --add-label "state:in-progress"

      - name: Apply changes
        if: steps.check.outputs.found == 'true'
        id: apply
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE=${{ steps.check.outputs.issue_number }}
          BRANCH="agent-a/issue-${ISSUE}-hardening"
          ALLOWED_FILES=${{ steps.check.outputs.allowed_files }}

          git checkout -b "$BRANCH"

          # Apply changes based on issue requirements
          # This section should be extended to parse issue body dynamically
          if grep -q "bytesReturned < A2450_REPORT_LENGTH" driver/OpenMagicKeyboardA2450Filter/Filter.c; then
            sed -i 's/bytesReturned < A2450_REPORT_LENGTH/bytesReturned != A2450_REPORT_LENGTH/' driver/OpenMagicKeyboardA2450Filter/Filter.c
            echo "Applied report-length hardening"
          fi

          # Requirement 5: Check for forbidden paths in diff
          DIFF=$(git diff --name-only)
          FORBIDDEN_PATHS="driver/[^F]|src/|tests/|README|\.github/workflows/|\.sln|\.vcxproj|\.csproj"

          if echo "$DIFF" | grep -qE "$FORBIDDEN_PATHS"; then
            echo "::error::Forbidden files modified: $(echo "$DIFF" | grep -E "$FORBIDDEN_PATHS")"
            exit 1
          fi

          # Commit
          git add $(echo "$ALLOWED_FILES" | tr '\n' ' ')
          git diff --cached --quiet || git commit -m "Agent A: Issue #${ISSUE}"

      - name: Run post-change dotnet test
        if: steps.check.outputs.found == 'true' && steps.apply.outcome == 'success'
        id: post_test
        shell: bash
        run: |
          # Requirement 7: Stop if post-change test fails
          dotnet test tests/OpenMagicKeyboard.TransformTests/ --verbosity normal
          if [ $? -ne 0 ]; then
            echo "::error::Post-change dotnet test failed"
            exit 1
          fi
          echo "Post-change test passed"

      - name: Push and create PR
        if: steps.check.outputs.found == 'true' && steps.post_test.outcome == 'success'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE=${{ steps.check.outputs.issue_number }}
          BRANCH="agent-a/issue-${ISSUE}-hardening"

          git push origin "$BRANCH"

          # Requirement 8: PR body with validation and safety confirmation
          TEST_RESULT=$(dotnet test tests/OpenMagicKeyboard.TransformTests/ --verbosity normal 2>&1 | tail -1)

          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Agent A: Issue #${ISSUE}" \
            --body "Closes #${ISSUE}

          ## Summary
          Automated code hardening by Agent A.

          ## Changed Files
          $(git diff --name-only main...$BRANCH | sed 's/^/- /')

          ## Validation
          - dotnet test: $TEST_RESULT
          - WDK build: Checked in CI (Windows runner)

          ## Safety Confirmation
          - ✅ No driver installation performed
          - ✅ No pnputil / devcon / TESTSIGNING
          - ✅ No registry / LowerFilters changes
          - ✅ No real A2450 hardware binding
          - ✅ No VM execution

          ## Remaining Risks
          - WDK build requires verification on local machine
          - VM load test not started

          🤖 Generated with GitHub Actions")

          gh pr edit $PR_URL --add-label "state:agent-c-review"
          gh issue comment $ISSUE --body "PR created: $PR_URL"
          gh issue edit $ISSUE \
            --remove-label "state:in-progress" \
            --add-label "state:pr-open" 2>/dev/null || \
          gh issue edit $ISSUE --add-label "state:pr-open"
